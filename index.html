<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGISTICA Y TRANSPORTE CARBONE</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    padding: 15px;
}

h1 {
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
}

.guardar {
    background: #22c55e;
    color: white;
}

.whatsapp {
    background: #25D366;
    color: white;
}
</style>
</head>

<body>

<div class="container">
<h1>🚛 Transporte Carbone</h1>

<input type="text" id="FECHA" placeholder="Fecha">
<input type="text" id="CLIENTE" placeholder="Cliente">
<input type="text" id="LUGAR DE CARGA" placeholder="Lugar de carga">
<input type="text" id="LUGAR DE DESCARGA" placeholder="Lugar de descarga">
<input type="text" id="PRODUCTO" placeholder="Producto">
<input type="number" id="Nº DE PESADA/REMITO" placeholder="Nº de pesada">
<input type="number" id="BRUTO" placeholder="Bruto">
<input type="number" id="TARA" placeholder="Tara">
<input type="number" id="NETO" placeholder="Neto">
<input type="text" id="MATRICULA" placeholder="Matricula">
<input type="text" id="kILOMETROS" placeholder="Kilometros">
<input type="text" id="CHOFER" placeholder="Chofer">
<input type="text" id="VIATICO" placeholder="SI/NO">

<button class="guardar" onclick="guardarExcel()">💾 Guardar en Excel</button>
<button class="whatsapp" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>

</div>

<script>
function obtenerDatos() {
    return {
        fecha: document.getElementById("fecha").value,
        cliente: document.getElementById("cliente").value,
        lugar de carga: document.getElementById("lugar de carga").value,
        lugar de descarga: document.getElementById("lugar de descarga").value,
        producto: document.getElementById("producto").value,
        Nº de pesada: document.getElementById("Nº de pesada").value,
        bruto: document.getElementById("bruto").value,
        tara: document.getElementById("tara").value,
        neto: document.getElementById("neto").value
        matricula: document.getElementById("matricula").value
        km: document.getElementById("km").value
        chfer: document.getElementById("chofer").value
        viatico: document.getElementById("viatico").value
    };
}

function guardarExcel() {
    let d = obtenerDatos();

    let contenido = 
`Fecha,Cliente,Lugar de carga,Lugar de descarga,Producto,Nº de pesada,Bruto,Tara,Neto,Matricula,km,Chofer,Viatico
${d.fecha},${d.cliente},${d.lugardecarga},${d.lugardedescarga},${d.producto},${d.Nºdepesada},${d.bruto},${d.tara},${d.neto},${d.matricula},${d.km},${d.chfer},${d.viatico}`;

    let blob = new Blob([contenido], { type: "text/csv" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "registro.csv";
    a.click();
}

function enviarWhatsApp() {
    let d = obtenerDatos();

    let mensaje = `🚛 Transporte Carbone
Fecha: ${d.fecha}
Cliente: ${d.cliente}
Lugar de carga: ${d.lugardecarga}
Lugar de descarga: ${d.lugardedescarga}
Producto: ${d.producto}
Nº de pesada: ${d.Nºdepesada}
Bruto: ${d.bruto}Kg
Tara: ${d.Tara}Kg
Neto: ${d.neto}kg
Matiricula: ${d.matricula}
kilometros: ${d.kilometros}
Chofer: ${d.chofer}
Viatico: ${d.viatico}

    let url1 = "https://wa.me/59891429535?text=" + encodeURIComponent(mensaje);
    let url2 = "https://wa.me/59891996783?text=" + encodeURIComponent(mensaje);

    window.open(url1, "_blank");
    window.open(url2, "_blank");
}
</script>

</body>
</html>
