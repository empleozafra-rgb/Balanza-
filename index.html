<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Transporte Carbone</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    padding: 15px;
}

h1 {
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
}

input, select {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
}

.guardar {
    background: #22c55e;
    color: white;
}

.whatsapp {
    background: #25D366;
    color: white;
}
</style>
</head>

<body>

<div class="container">
<h1>🚛 Transporte Carbone</h1>

<input type="text" id="fecha" placeholder="Fecha">
<input type="text" id="chofer" placeholder="Chofer">
<input type="text" id="camion" placeholder="Camión">
<input type="text" id="origen" placeholder="Origen">
<input type="text" id="destino" placeholder="Destino">
<input type="number" id="peso" placeholder="Peso (kg)">
<input type="number" id="humedad" placeholder="Humedad (%)">
<input type="text" id="producto" placeholder="Producto">
<input type="text" id="observaciones" placeholder="Observaciones">

<button class="guardar" onclick="guardarExcel()">💾 Guardar en Excel</button>
<button class="whatsapp" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>

</div>

<script>
function obtenerDatos() {
    return {
        fecha: document.getElementById("fecha").value,
        chofer: document.getElementById("chofer").value,
        camion: document.getElementById("camion").value,
        origen: document.getElementById("origen").value,
        destino: document.getElementById("destino").value,
        peso: document.getElementById("peso").value,
        humedad: document.getElementById("humedad").value,
        producto: document.getElementById("producto").value,
        observaciones: document.getElementById("observaciones").value
    };
}

function guardarExcel() {
    let d = obtenerDatos();

    let contenido = 
`Fecha,Chofer,Camion,Origen,Destino,Peso,Humedad,Producto,Observaciones
${d.fecha},${d.chofer},${d.camion},${d.origen},${d.destino},${d.peso},${d.humedad},${d.producto},${d.observaciones}`;

    let blob = new Blob([contenido], { type: "text/csv" });
    let url = URL.createObjectURL(blob);

    let a = document.createElement("a");
    a.href = url;
    a.download = "registro.csv";
    a.click();
}

function enviarWhatsApp() {
    let d = obtenerDatos();

    let mensaje = `🚛 Transporte Carbone
Fecha: ${d.fecha}
Chofer: ${d.chofer}
Camión: ${d.camion}
Origen: ${d.origen}
Destino: ${d.destino}
Peso: ${d.peso} kg
Humedad: ${d.humedad}%
Producto: ${d.producto}
Obs: ${d.observaciones}`;

    let url1 = "https://wa.me/59891429535?text=" + encodeURIComponent(mensaje);
    let url2 = "https://wa.me/59891996783?text=" + encodeURIComponent(mensaje);

    window.open(url1, "_blank");
    window.open(url2, "_blank");
}
</script>

</body>
</html>
