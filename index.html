<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema de Pesaje</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    padding: 20px;
}

.container {
    background: white;
    padding: 25px;
    border-radius: 12px;
    max-width: 500px;
    margin: auto;
    box-shadow: 0px 0px 10px rgba(0,0,0,0.1);
}

h2 {
    text-align: center;
}

input, button {
    width: 100%;
    padding: 12px;
    margin-top: 12px;
    font-size: 16px;
}

button {
    background: #28a745;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button:hover {
    background: #218838;
}

#mensaje {
    display: none;
    text-align: center;
    margin-top: 20px;
    font-weight: bold;
    color: green;
    font-size: 18px;
}
</style>
</head>

<body>

<div class="container">

<h2>🚛 Sistema de Pesaje</h2>

<input type="text" id="numero" placeholder="N° de pesada">
<input type="text" id="matricula" placeholder="Matrícula">
<input type="number" id="peso" placeholder="Peso">

<button onclick="guardar()">Guardar</button>

<div id="mensaje">✅ Guardado correctamente en Excel</div>

</div>

<script>

const sonido = new Audio("https://www.soundjay.com/buttons/sounds/button-3.mp3");

// 👉 Convertir matrícula a MAYÚSCULAS mientras escribe
document.getElementById("matricula").addEventListener("input", function() {
    this.value = this.value.toUpperCase();
});

function guardar() {

    let numero = document.getElementById("numero").value;
    let matricula = document.getElementById("matricula").value;
    let peso = document.getElementById("peso").value;

    if (!numero || !matricula || !peso) {
        alert("Completá todos los campos");
        return;
    }

    // 👉 ACÁ va tu envío a Excel / Google Sheets
    console.log("Guardado:", numero, matricula, peso);

    // 👉 Mostrar mensaje
    let msg = document.getElementById("mensaje");
    msg.style.display = "block";

    // 👉 Sonido
    sonido.play();

    // 👉 Limpiar campos
    document.getElementById("numero").value = "";
    document.getElementById("matricula").value = "";
    document.getElementById("peso").value = "";

    // 👉 Volver foco al inicio
    document.getElementById("numero").focus();

    // 👉 Ocultar mensaje automático
    setTimeout(() => {
        msg.style.display = "none";
    }, 2000);
}

</script>

</body>
</html>
