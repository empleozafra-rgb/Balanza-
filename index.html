<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOGISTICA Y TRANSPORTE CARBONE</title>

<style>
body {
    font-family: Arial, sans-serif;
    background: #0f172a;
    color: white;
    padding: 15px;
}

h1 {
    text-align: center;
}

.container {
    max-width: 500px;
    margin: auto;
}

input {
    width: 100%;
    padding: 12px;
    margin: 8px 0;
    border-radius: 8px;
    border: none;
    font-size: 16px;
}

button {
    width: 100%;
    padding: 15px;
    margin-top: 10px;
    border: none;
    border-radius: 10px;
    font-size: 16px;
    font-weight: bold;
}

.guardar {
    background: #22c55e;
    color: white;
}

.whatsapp {
    background: #25D366;
    color: white;
}
</style>
</head>

<body>

<div class="container">
<h1>🚛 Transporte Carbone</h1>

<input type="text" id="fecha" placeholder="Fecha">
<input type="text" id="cliente" placeholder="Cliente">
<input type="text" id="carga" placeholder="Lugar de carga">
<input type="text" id="descarga" placeholder="Lugar de descarga">
<input type="text" id="producto" placeholder="Producto">

<!-- CAMBIO: ahora es text -->
<input type="text" id="pesada" placeholder="Nº de pesada">

<input type="number" id="bruto" placeholder="Bruto">
<input type="number" id="tara" placeholder="Tara">
<input type="number" id="neto" placeholder="Neto">

<input type="text" id="matricula" placeholder="Matricula">
<input type="text" id="km" placeholder="Kilometros">
<input type="text" id="chofer" placeholder="Chofer">
<input type="text" id="viatico" placeholder="Viatico (SI/NO)">

<button class="guardar" onclick="guardarOnline()">☁️ Guardar en Excel Online</button>
<button class="whatsapp" onclick="enviarWhatsApp()">📲 Enviar por WhatsApp</button>

</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbxK35dMdHzJ7ilJz5Ix9QjJl51fGXUnUdy7G9winVvGkcxoi04kok-LaYXYZvizZfwu/exec";

function obtenerDatos() {
    return {
        fecha: document.getElementById("fecha").value,
        cliente: document.getElementById("cliente").value,
        carga: document.getElementById("carga").value,
        descarga: document.getElementById("descarga").value,
        producto: document.getElementById("producto").value,
        pesada: document.getElementById("pesada").value,
        bruto: document.getElementById("bruto").value,
        tara: document.getElementById("tara").value,
        neto: document.getElementById("neto").value,
        matricula: document.getElementById("matricula").value,
        km: document.getElementById("km").value,
        chofer: document.getElementById("chofer").value,
        viatico: document.getElementById("viatico").value
    };
}

// 🔥 NUEVO: limpia todos los campos
function limpiarCampos() {
    document.querySelectorAll("input").forEach(input => input.value = "");
}

function guardarOnline() {
    let datos = obtenerDatos();

    fetch(URL, {
        method: "POST",
        body: JSON.stringify(datos)
    })
    .then(() => {
        alert("✅ Guardado en Excel online");
        limpiarCampos(); // 🔥 limpia después de guardar
    })
    .catch(() => {
        alert("❌ Error al guardar");
    });
}

function enviarWhatsApp() {
    let d = obtenerDatos();

    let mensaje = `🚛 Transporte Carbone
Fecha: ${d.fecha}
Cliente: ${d.cliente}
Carga: ${d.carga}
Descarga: ${d.descarga}
Producto: ${d.producto}
Pesada: ${d.pesada}
Bruto: ${d.bruto} Kg
Tara: ${d.tara} Kg
Neto: ${d.neto} Kg
Matricula: ${d.matricula}
Kilometros: ${d.km}
Chofer: ${d.chofer}
Viatico: ${d.viatico}`;

    let url1 = "https://wa.me/59891429535?text=" + encodeURIComponent(mensaje);
    let url2 = "https://wa.me/59891996783?text=" + encodeURIComponent(mensaje);

    window.open(url1, "_blank");
    window.open(url2, "_blank");

    limpiarCampos(); // 🔥 limpia después de enviar
}
</script>

</body>
</html>
